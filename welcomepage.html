<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drink POS - Ready to Serve</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #4f46e5;
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      }

      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: var(--bg-gradient);
        font-family: "Plus Jakarta Sans", sans-serif;
      }

      .welcome-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        padding: 60px 48px;
        border-radius: 32px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 420px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        transition: transform 0.3s ease;
      }

      .welcome-card:hover {
        transform: translateY(-5px);
      }

      .icon-box {
        font-size: 48px;
        margin-bottom: 24px;
        display: block;
      }

      h1 {
        font-size: 36px;
        font-weight: 800;
        color: #0f172a;
        margin-bottom: 12px;
        letter-spacing: -1px;
      }
      p {
        color: #64748b;
        margin-bottom: 40px;
        line-height: 1.6;
        font-size: 16px;
      }

      .btn-start {
        background-color: var(--primary);
        color: white;
        padding: 18px 40px;
        border-radius: 16px;
        text-decoration: none;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        transition: all 0.2s;
        box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3);
      }
      .btn-start:hover {
        background-color: #4338ca;
        transform: scale(1.02);
      }
    </style>
  </head>
  <body>
    <div class="welcome-card">
      <span class="icon-box">🥤</span>
      <h1>Bullet Club drink</h1>
      <p>
        Your professional station for managing orders and tracking sales history
        with ease.
      </p>
      <a href="index.html" class="btn-start">Get Started →</a>
    </div>
  </body>
</html>
